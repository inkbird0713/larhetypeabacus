<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>👵 암산왕 할머니</title>
    <style>
        :root { --primary: #e63946; --bg: #fdf0d5; --text: #003049; }
        body { text-align: center; font-family: 'Malgun Gothic', sans-serif; background: var(--bg); padding: 10px; color: var(--text); overflow-x: hidden; }
        
        .container { background: white; width: 95%; max-width: 450px; margin: 0 auto; padding: 25px 15px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 4px solid #f1faee; box-sizing: border-box; }
        
        h2 { font-size: 28px; color: var(--primary); margin: 0 0 5px 0; }
        .sub-title { font-size: 16px; color: #666; margin-bottom: 20px; }

        #page-menu { display: block; }
        #page-quiz { display: none; }

        /* 자릿수 선택기 */
        .digit-selector { background: #f1faee; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; }
        .digit-selector input { width: 50px; font-size: 20px; text-align: center; border: 2px solid var(--primary); border-radius: 8px; color: var(--primary); }

        .btn-lv { width: 100%; padding: 18px; margin: 8px 0; border: 3px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; transition: 0.2s; }
        .btn-lv:hover { background: #f1faee; border-color: var(--primary); }
        .btn-lv b { font-size: 22px; display: block; color: var(--text); }
        .btn-lv small { font-size: 14px; color: #555; }
        
        #card { 
            background: #fff; border: 5px solid var(--text); 
            min-height: 450px; max-height: 80vh; margin: 15px 0; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 20px; position: relative; cursor: pointer; padding: 20px 0;
        }

        .q-body-add { display: inline-block; font-weight: 900; font-family: 'Consolas', monospace; }
        .row-add { display: flex; justify-content: flex-end; align-items: center; width: 300px; margin: 2px 0; }
        .sign { width: 50px; text-align: left; color: var(--primary); font-size: 0.8em; }
        .num { flex-grow: 1; text-align: right; letter-spacing: 2px; }

        .line-wrapper { border-bottom: 6px solid #000; padding-bottom: 5px; margin-bottom: 5px; }
        
        #ans-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #2a9d8f; color: white; display: none;
            flex-direction: column; align-items: center; justify-content: center; border-radius: 12px;
        }

        .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn-ui { padding: 12px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; }
        #page-info { font-size: 20px; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-menu">
        <h2>👵 암산왕 할머니</h2>
        <div class="sub-title">할머니, 오늘도 즐겁게 연습해요!</div>
        
        <!-- [추가] 자릿수 직접 선택 기능 -->
        <div class="digit-selector">
            🔢 몇 자릿수로 할까요? 
            <input type="number" id="customDigit" value="3" min="1" max="8"> 자리
        </div>

        <button class="btn-lv" onclick="gameStartWithDigit(4, 'plus')"><b>🌱 1단계</b><small>4줄 연습 / 덧셈</small></button>
        <button class="btn-lv" onclick="gameStartWithDigit(5, 'plus')"><b>🥉 2단계</b><small>5줄 연습 / 덧셈</small></button>
        <button class="btn-lv" onclick="gameStartWithDigit(5, 'mix')"><b>🥈 3단계</b><small>5줄 연습 / 덧뺄셈</small></button>
        <button class="btn-lv" onclick="gameStartWithDigit(7, 'mix')"><b>🥇 4단계</b><small>7줄 연습 / 덧뺄셈</small></button>
    </div>

    <div id="page-quiz">
        <div id="card" onclick="showAnswer()">
            <div id="q-text"></div>
            <div id="ans-box">
                <div style="font-size:20px; margin-bottom:10px;">정답은 바로!</div>
                <div id="ans-val" style="font-size:60px; font-weight:900;">0</div>
                <div style="font-size:16px; margin-top:20px; opacity:0.8;">(눌러서 문제로 돌아가기)</div>
            </div>
        </div>
        <div class="nav">
            <button class="btn-ui" onclick="goBack()">처음으로</button>
            <span id="page-info">1 / 10</span>
            <button class="btn-ui" style="background:var(--primary)" onclick="goNext()">다음 문제</button>
        </div>
    </div>
</div>

<script>
    var items = []; var cur = 0;
    
    // 자릿수 입력을 받아 게임 시작
    function gameStartWithDigit(rows, mode) {
        var digit = document.getElementById('customDigit').value || 3;
        gameStart(parseInt(digit), rows, mode);
    }

    function gameStart(digit, rows, mode) {
        items = []; cur = 0;
        for(var i=0; i<10; i++) {
            var nums = []; var sum = 0;
            for(var j=0; j<rows; j++) {
                var v = Math.floor(Math.random() * (Math.pow(10, digit) - Math.pow(10, digit-1))) + Math.pow(10, digit-1);
                if(j === 0) { nums.push({v: v, s: ""}); sum = v; }
                else {
                    var s = (mode === 'plus') ? "+" : (Math.random() > 0.4 ? "+" : "-");
                    if(s === "-" && sum - v < 0) s = "+"; 
                    nums.push({v: v, s: s});
                    sum = (s === "+") ? sum + v : sum - v;
                }
            }
            items.push({ q: nums, a: sum });
        }
        document.getElementById('page-menu').style.display = 'none';
        document.getElementById('page-quiz').style.display = 'block';
        draw();
    }

    function draw() {
        var it = items[cur];
        var rowCount = it.q.length;
        var maxNumLen = it.q[0].v.toString().length;
        
        // 자릿수에 따른 글자 크기 및 고정 너비 자동 조절
        var fontSize = maxNumLen > 5 ? "40px" : (maxNumLen > 3 ? "50px" : "60px");
        if(rowCount > 7) fontSize = "35px"; // 줄이 많아지면 더 작게

        var h = "<div class='q-body-add' style='font-size:" + fontSize + "'>";
        for(var i=0; i<rowCount; i++) {
            var isLast = (i === rowCount - 1);
            var lineClass = isLast ? "line-wrapper" : "";
            h += "<div class='row-add " + lineClass + "' style='width:" + (maxNumLen * 25 + 70) + "px'>";
            h += "<div class='sign'>" + it.q[i].s + "</div>";
            h += "<div class='num'>" + it.q[i].v + "</div>";
            h += "</div>";
        }
        h += "</div>";
        
        document.getElementById('q-text').innerHTML = h;
        document.getElementById('ans-val').innerText = it.a.toLocaleString();
        document.getElementById('ans-box').style.display = 'none';
        document.getElementById('page-info').innerText = (cur + 1) + " / 10";
    }

    function showAnswer() { 
        var ab = document.getElementById('ans-box'); 
        ab.style.display = (ab.style.display === 'none') ? 'flex' : 'none'; 
    }
    
    function goNext() { 
        if(cur < 9) { cur++; draw(); } 
        else { alert("할머니, 정말 최고에요!"); goBack(); } 
    }
    
    function goBack() { 
        document.getElementById('page-menu').style.display = 'block'; 
        document.getElementById('page-quiz').style.display = 'none'; 
    }
</script>
</body>
</html>
